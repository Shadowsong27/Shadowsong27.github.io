baseURL = "https://shadowsong27.github.io/"
defaultContentLanguage = "en"
title = "Shadowsong's Personal Website"
theme = "blowfish"
enableRobotsTXT = true
summaryLength = 0
enableEmoji = true
canonifyURLs = false
capitalizeListTitles = false

[services]
  [services.googleAnalytics]
    ID = "G-1SHS81MHHD"

[pagination]
  pagerSize = 10

[permalinks]
  post = "/:year/:month/:slug/"

[taxonomies]
  tag = "tags"
  category = "categories"
  author = "authors"
  series = "series"
  archive = "archives"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[imaging]
  anchor = "Center"

[markup]
  [markup.goldmark]
    [markup.goldmark.parser]
      wrapStandAloneImageWithinParagraph = false
      [markup.goldmark.parser.attribute]
        block = true
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['\\[', '\\]'], ['$$', '$$']]
          inline = [['\\(', '\\)']]
  [markup.highlight]
    noClasses = false
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4

[params]
  colorScheme = "blowfish"
  defaultAppearance = "light"
  autoSwitchAppearance = true
  enableSearch = true
  enableCodeCopy = true
  mainSections = ["post"]
  disableImageOptimization = true
  disableImageOptimizationMD = true
  description = "I just want to sit in my garden and tend my pipelines."
  defaultBackgroundImage = "/img/background.svg"

  [params.header]
    layout = "basic"

  [params.footer]
    showMenu = true
    showCopyright = true
    showThemeAttribution = true
    showAppearanceSwitcher = true
    showScrollToTop = true

  [params.homepage]
    layout = "background"
    homepageImage = "/img/background.svg"
    showRecent = true
    showRecentItems = 8
    showMoreLink = true
    showMoreLinkDest = "/post/"
    cardView = true
    cardViewScreenWidth = false

  [params.article]
    showDate = true
    showAuthor = false
    showReadingTime = true
    showWordCount = true
    showTableOfContents = true
    showTaxonomies = true
    showCategories = true
    showTags = true
    showPagination = true
    showHero = true
    heroStyle = "background"
    layoutBackgroundBlur = true
    layoutBackgroundHeaderSpace = true

  [params.list]
    showSummary = true
    showCards = true
    groupByYear = true
    cardView = true
    constrainItemsWidth = false
    showHero = true
    heroStyle = "background"
    layoutBackgroundBlur = true
    layoutBackgroundHeaderSpace = true

  [params.taxonomy]
    showTermCount = true
    cardView = true
    showHero = true
    heroStyle = "background"
    layoutBackgroundBlur = true

  [params.term]
    groupByYear = true
    cardView = true
    showHero = true
    heroStyle = "background"
    layoutBackgroundBlur = true

[languages]
  [languages.en]
    disabled = false
    locale = "en-US"
    label = "English"
    weight = 1
    title = "Shadowsong's Personal Website"
    [languages.en.params]
      displayName = "EN"
      isoCode = "en"
      rtl = false
      dateFormat = "2 January 2006"
      description = "I just want to sit in my garden and tend my pipelines."
      [languages.en.params.author]
        name = "Shadowsong27"
        image = "https://avatars3.githubusercontent.com/u/12522657?s=400&u=ccfcf050a757c6a49241737eefe4386064400b5e&v=4"
        headline = "I just want to sit in my garden and tend my pipelines."
        bio = "Personal notes on data, software, media, food, and AI logs."
        links = [
          { github = "https://github.com/Shadowsong27" },
        ]

[[menus.main]]
  name = "Posts"
  pageRef = "post"
  weight = 10

[[menus.main]]
  name = "Categories"
  pageRef = "categories"
  weight = 20

[[menus.main]]
  name = "Career"
  pageRef = "career"
  weight = 30

[[menus.main]]
  name = "Food"
  pageRef = "food"
  weight = 40

[[menus.main]]
  name = "Search"
  pageRef = "search"
  weight = 50

[[menus.footer]]
  name = "Posts"
  pageRef = "post"
  weight = 10

[[menus.footer]]
  name = "Categories"
  pageRef = "categories"
  weight = 20
